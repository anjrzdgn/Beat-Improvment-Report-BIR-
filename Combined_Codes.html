<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beat Improve Report (BIR)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Vazirmatn', 'Tahoma', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            background-size: cover;
            direction: rtl;
        }

        .app-container {
            width: 100%;
            height: 100%;
            backdrop-filter: brightness(0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow: hidden;
        }

        .app-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px black;
            margin-bottom: 8px;
            text-align: center;
        }

        .live-clock {
            font-size: 1.2rem;
            font-family: monospace;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 40px;
            margin-bottom: 15px;
            text-align: center;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            width: 95%;
            max-width: 1200px;
        }

        .bir-form {
            flex: 2;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(5px);
        }

        .custom-keyboard {
            flex: 1;
            background: rgba(30,30,40,0.9);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 200px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .keyboard-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .key-btn {
            background: #2c3e50;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            padding: 15px 0;
            width: 70px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            font-family: monospace;
        }
        .key-btn:active {
            background: #1a2a3a;
            transform: scale(0.96);
        }
        .key-clear {
            background: #8b0000;
            width: auto;
            flex: 1;
            font-size: 1.4rem;
        }

        .two-columns {
            display: flex;
            flex-direction: row;
            gap: 25px;
            justify-content: space-between;
        }

        .right-col, .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field-group label {
            color: white;
            font-size: 0.95rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 black;
            padding-right: 4px;
        }

        .field-group select, .field-group input {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border-radius: 16px;
            border: none;
            background: white;
            color: black;
            text-align: center;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }

        .numeric-field input {
            background-color: #f0f0f0;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .double-field-row {
            display: flex;
            gap: 10px;
        }
        .double-field-row .half {
            flex: 1;
        }

        /* گروه دکمه‌های اصلی - سه دکمه در یک خط */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }
        
        /* دکمه پاک کردن امروز - حالا مثل بقیه دکمه‌ها */
        .btn-clear {
            background-color: #8b0000;
            color: white;
            flex: 1;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-clear:active { background-color: #5c0000; }

        button {
            flex: 1;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-refresh { background-color: #ff9800; color: white; }
        .btn-save { background-color: #4caf50; color: white; }
        .btn-export { background-color: #2196f3; color: white; }

        .today-counter {
            font-size: 0.9rem;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 40px;
            text-align: center;
        }

        .btn-fullscreen {
            background-color: #555;
            color: white;
            transition: 0.2s;
        }
        .btn-fullscreen:active {
            background-color: #333;
            transform: scale(0.96);
        }

        .footer-copyright {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .message {
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: #ffd966;
            padding: 6px;
            border-radius: 28px;
            width: 90%;
        }

        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
                align-items: center;
            }
            .custom-keyboard {
                width: 100%;
                margin-top: 10px;
            }
            .key-btn {
                width: 60px;
                font-size: 1.4rem;
                padding: 12px 0;
            }
            .two-columns {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 class="app-title">🎯 Beat Improve Report (BIR)</h1>

        <div class="live-clock" id="liveClock">00:00:00 2026-05-10</div>

        <div class="main-layout">
            <form id="birForm" class="bir-form">
                <div class="two-columns">
                    <div class="right-col">
                        <div class="field-group">
                            <label>سال تولد</label>
                            <select id="birthYear"></select>
                        </div>
                        <div class="field-group">
                            <label>ماه تولد</label>
                            <select id="birthMonth" required>
                                <option value="فروردین">فروردین</option><option value="اردیبهشت">اردیبهشت</option>
                                <option value="خرداد">خرداد</option><option value="تیر">تیر</option>
                                <option value="مرداد">مرداد</option><option value="شهریور">شهریور</option>
                                <option value="مهر">مهر</option><option value="آبان">آبان</option>
                                <option value="آذر">آذر</option><option value="دی">دی</option>
                                <option value="بهمن">بهمن</option><option value="اسفند">اسفند</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>جنسیت</label>
                            <select id="gender">
                                <option value="F">F (دختر)</option><option value="M">M (پسر)</option>
                            </select>
                        </div>
                    </div>

                    <div class="left-col">
                        <div class="field-group">
                            <label>شماره استیشن</label>
                            <select id="station">
                                <option value="1">1</option><option value="2">2</option>
                            </select>
                        </div>
                        <div class="field-group" id="difficultyGroup" style="display: none;">
                            <label>سختی کار</label>
                            <select id="difficulty">
                                <option value="جهت‌دار-آسان">جهت‌دار-آسان</option>
                                <option value="جهت‌دار-متوسط">جهت‌دار-متوسط</option>
                                <option value="جهت‌دار-سخت">جهت‌دار-سخت</option>
                                <option value="نقطه‌ای-آسان">نقطه‌ای-آسان</option>
                                <option value="نقطه‌ای-متوسط">نقطه‌ای-متوسط</option>
                                <option value="نقطه‌ای-سخت">نقطه‌ای-سخت</option>
                            </select>
                        </div>
                        <div class="double-field-row">
                            <div class="field-group half numeric-field">
                                <label>بار چندم</label>
                                <input type="text" id="sessionNumber" class="numeric-input" placeholder="عدد" readonly>
                            </div>
                            <div class="field-group half numeric-field">
                                <label>امتیاز</label>
                                <input type="text" id="score" class="numeric-input score-input" placeholder="عدد" readonly>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- سه دکمه اصلی در یک خط -->
                <div class="button-group">
                    <button type="button" id="exportTodayBtn" class="btn-export">📁 خروجی امروز</button>
                    <button type="button" id="refreshBtn" class="btn-refresh">♻️ تازه‌سازی صفحه</button>
                    <button type="submit" id="saveBtn" class="btn-save">💾 ذخیره</button>
                </div>

                <div class="today-counter" id="todayCounter">تعداد داده‌های ذخیره‌شده امروز: 0</div>
                
                <!-- دکمه پاک کردن امروز - حالا در یک خط جداگانه ولی با عرض یکسان -->
                <button type="button" id="clearTodayBtn" class="btn-clear">🗑️ پاک کردن داده‌های امروز</button>
                <!-- دکمه تمام صفحه (سمت چپ پایین) -->
                <div style="display: flex; justify-content: flex-start; margin-top: 5px;">
                    <button type="button" id="fullscreenBtn" class="btn-fullscreen" style="background-color: #555; color: white; padding: 6px 12px; font-size: 0.8rem; width: auto; min-width: 100px;">⛶ تمام صفحه</button>
                </div>
                <div class="footer-copyright">A Medulator App© May-2026</div>
            </form>

            <div class="custom-keyboard" id="customKeyboard">
                <div class="keyboard-row">
                    <button type="button" class="key-btn" data-value="7">7</button>
                    <button type="button" class="key-btn" data-value="8">8</button>
                    <button type="button" class="key-btn" data-value="9">9</button>
                </div>
                <div class="keyboard-row">
                    <button type="button" class="key-btn" data-value="4">4</button>
                    <button type="button" class="key-btn" data-value="5">5</button>
                    <button type="button" class="key-btn" data-value="6">6</button>
                </div>
                <div class="keyboard-row">
                    <button type="button" class="key-btn" data-value="1">1</button>
                    <button type="button" class="key-btn" data-value="2">2</button>
                    <button type="button" class="key-btn" data-value="3">3</button>
                </div>
                <div class="keyboard-row">
                    <button type="button" class="key-btn" data-value="0">0</button>
                    <button type="button" id="clearDigitBtn" class="key-btn key-clear">⌫</button>
                </div>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        // ---------- صوت با Web Audio API ----------
        function playBeep(frequency, duration, volume = 0.3) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.frequency.value = frequency;
                gain.gain.value = volume;
                oscillator.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.stop(audioCtx.currentTime + duration);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) { console.log("Web Audio not supported"); }
        }
        function playSuccess() { playBeep(880, 0.2, 0.2); }
        function playError() { playBeep(440, 0.4, 0.2); }

        // ---------- زمان ایران با offset +3:30 ----------
        function getIranTime() {
            const now = new Date();
            const offset = 3.5 * 60 * 60 * 1000;
            const localOffset = now.getTimezoneOffset() * 60 * 1000;
            return new Date(now.getTime() + localOffset + offset);
        }
        function formatIranDateTime() {
            const date = getIranTime();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds} ${year}-${month}-${day}`;
        }
        function updateClock() {
            document.getElementById("liveClock").innerText = formatIranDateTime();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ---------- داده‌ها ----------
        let birData = [];
        function loadDataFromLocalStorage() {
            const stored = localStorage.getItem("bir_records");
            birData = stored ? JSON.parse(stored) : [];
            updateTodayCounter();
        }
        function saveAllToLocalStorage() {
            localStorage.setItem("bir_records", JSON.stringify(birData));
            updateTodayCounter();
        }
        function updateTodayCounter() {
            const today = getIranTime().toISOString().slice(0,10);
            const todayCount = birData.filter(rec => rec.date_saved === today).length;
            document.getElementById("todayCounter").innerText = `تعداد داده‌های ذخیره‌شده امروز: ${todayCount}`;
        }

        // ---------- پر کردن سال‌ها ----------
        const yearSelect = document.getElementById("birthYear");
        for (let y = 83; y <= 98; y++) {
            const option = document.createElement("option");
            option.value = y;
            option.textContent = y;
            if (y === 83) option.selected = true;
            yearSelect.appendChild(option);
        }

        // ---------- سختی شرطی ----------
        const stationSelect = document.getElementById("station");
        const difficultyGroup = document.getElementById("difficultyGroup");
        function toggleDifficulty() {
            if (stationSelect.value === "1") {
                difficultyGroup.style.display = "flex";
                document.getElementById("difficulty").required = true;
            } else {
                difficultyGroup.style.display = "none";
                document.getElementById("difficulty").required = false;
            }
        }
        stationSelect.addEventListener("change", toggleDifficulty);
        toggleDifficulty();

        // ---------- کیبورد اختصاصی ----------
        let activeField = null;
        const sessionInput = document.getElementById("sessionNumber");
        const scoreInput = document.getElementById("score");

        function getRawValue(field) {
            let val = field.value.replace(/,/g, '');
            if (val === "") return "";
            let num = parseInt(val, 10);
            return isNaN(num) ? "" : num;
        }

        function setScoreFormatted(value) {
            if (value === "" || value === null) {
                scoreInput.value = "";
                return;
            }
            let num = parseInt(value.toString().replace(/,/g, ''), 10);
            if (isNaN(num)) scoreInput.value = "";
            else scoreInput.value = num.toLocaleString('en-US');
        }

        function activateField(field, isScore = false) {
            activeField = field;
            let raw = getRawValue(field);
            field._rawValue = raw === "" ? "" : raw.toString();
        }

        sessionInput.addEventListener("click", () => activateField(sessionInput, false));
        scoreInput.addEventListener("click", () => activateField(scoreInput, true));

        function appendToActive(value) {
            if (!activeField) {
                showMessage("ابتدا روی فیلد بار چندم یا امتیاز کلیک کنید", "error");
                return;
            }
            let currentRaw = activeField._rawValue !== undefined ? activeField._rawValue : getRawValue(activeField);
            if (currentRaw === "") currentRaw = "";
            let newRaw = currentRaw + value;
            if (newRaw.startsWith('0') && newRaw.length > 1) newRaw = newRaw.replace(/^0+/, '');
            if (newRaw === "") newRaw = "0";
            activeField._rawValue = newRaw;
            
            if (activeField === scoreInput) {
                let num = parseInt(newRaw, 10);
                if (!isNaN(num)) scoreInput.value = num.toLocaleString('en-US');
                else scoreInput.value = "";
            } else {
                sessionInput.value = newRaw;
            }
        }

        function clearActive() {
            if (!activeField) return;
            activeField._rawValue = "";
            if (activeField === scoreInput) {
                scoreInput.value = "";
            } else {
                sessionInput.value = "";
            }
        }

        document.querySelectorAll('.key-btn[data-value]').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.getAttribute('data-value');
                appendToActive(val);
            });
        });
        document.getElementById('clearDigitBtn').addEventListener('click', () => clearActive());

        // ---------- رفرش ----------
        function refreshForm() {
            // document.getElementById("birthYear").value = "83";
            // document.getElementById("birthMonth").value = "فروردین";
            // document.getElementById("gender").value = "F";
            // document.getElementById("station").value = "1";
            // toggleDifficulty();
            // document.getElementById("difficulty").value = "جهت‌دار-آسان";
            sessionInput.value = "";
            scoreInput.value = "";
            if (activeField) {
                activeField._rawValue = "";
                activeField = null;
            }
            showMessage("فرم به حالت اولیه برگشت.", "info");
        }

        // ---------- بررسی تکراری ----------
        function isDuplicate(record) {
            return birData.some(existing => 
                existing.birth_year === record.birth_year &&
                existing.birth_month === record.birth_month &&
                existing.gender === record.gender &&
                existing.station === record.station &&
                existing.session_number === record.session_number &&
                existing.score === record.score &&
                (record.station === "2" ? existing.difficulty === null : existing.difficulty === record.difficulty)
            );
        }

        // ---------- اعتبارسنجی ----------
        function validateForm() {
            let sessionRaw = sessionInput._rawValue !== undefined ? sessionInput._rawValue : sessionInput.value.replace(/,/g, '');
            let scoreRaw = scoreInput._rawValue !== undefined ? scoreInput._rawValue : scoreInput.value.replace(/,/g, '');
            
            if (!sessionRaw || sessionRaw === "") {
                showMessage("❌ لطفاً تعداد جلسه (بار چندم) را وارد کنید.", "error");
                playError();
                return false;
            }
            let sessionNum = parseInt(sessionRaw, 10);
            if (isNaN(sessionNum) || sessionNum < 0) {
                showMessage("❌ تعداد جلسه باید یک عدد صحیح نامنفی باشد.", "error");
                playError();
                return false;
            }
            
            if (!scoreRaw || scoreRaw === "") {
                showMessage("❌ لطفاً امتیاز را وارد کنید.", "error");
                playError();
                return false;
            }
            let scoreVal = parseInt(scoreRaw, 10);
            if (isNaN(scoreVal) || scoreVal < 0) {
                showMessage("❌ امتیاز باید یک عدد صحیح نامنفی باشد.", "error");
                playError();
                return false;
            }
            
            if (stationSelect.value === "1") {
                const diff = document.getElementById("difficulty").value;
                if (!diff) {
                    showMessage("❌ در استیشن 1، حتماً باید سختی کار انتخاب شود.", "error");
                    playError();
                    return false;
                }
            }
            return { sessionNum, scoreVal };
        }

        // ---------- ذخیره ----------
        function saveRecord() {
            const validation = validateForm();
            if (!validation) return;
            const { sessionNum, scoreVal } = validation;
            
            const iranNow = getIranTime();
            const timestampSave = formatIranDateTime();
            const dateSaved = iranNow.toISOString().slice(0,10);
            
            const record = {
                timestamp_save: timestampSave,
                date_saved: dateSaved,
                birth_year: document.getElementById("birthYear").value,
                birth_month: document.getElementById("birthMonth").value,
                gender: document.getElementById("gender").value,
                station: stationSelect.value,
                session_number: sessionNum,
                score: scoreVal,
                difficulty: stationSelect.value === "1" ? document.getElementById("difficulty").value : null
            };
            
            if (isDuplicate(record)) {
                showMessage("❌ این داده قبلاً ذخیره شده است! امکان ثبت تکراری وجود ندارد.", "error");
                playError();
                return;
            }
            
            birData.push(record);
            saveAllToLocalStorage();
            showMessage("✅ اطلاعات با موفقیت ذخیره شد.", "success");
            playSuccess();
            updateTodayCounter();
        }

        // ---------- خروجی امروز ----------
        function exportTodayData() {
            const today = getIranTime().toISOString().slice(0,10);
            const todayRecords = birData.filter(rec => rec.date_saved === today);
            if (todayRecords.length === 0) {
                showMessage("⚠️ هیچ داده‌ای برای امروز وجود ندارد.", "error");
                playError();
                return;
            }
            const jsonContent = JSON.stringify(todayRecords, null, 2);
            const blob = new Blob([jsonContent], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Bir_data_${today}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showMessage(`📁 خروجی ${todayRecords.length} رکورد از امروز دانلود شد.`, "success");
            playSuccess();
        }

        // ---------- پاک کردن داده‌های امروز ----------
        function clearTodayData() {
            const today = getIranTime().toISOString().slice(0,10);
            const todayCount = birData.filter(rec => rec.date_saved === today).length;
            if (todayCount === 0) {
                showMessage("⚠️ هیچ داده‌ای برای امروز وجود ندارد.", "error");
                playError();
                return;
            }
            const confirmClear = confirm(`آیا مطمئنی که می‌خواهی تمام ${todayCount} داده‌ی امروز (${today}) را پاک کنی؟`);
            if (!confirmClear) return;
            birData = birData.filter(rec => rec.date_saved !== today);
            saveAllToLocalStorage();
            showMessage(`🗑️ ${todayCount} داده مربوط به امروز پاک شد.`, "success");
            playSuccess();
        }

        // ---------- نمایش پیام ----------
        let messageTimeout;
        function showMessage(text, type) {
            const msgDiv = document.getElementById("message");
            msgDiv.innerText = text;
            msgDiv.style.color = (type === "error") ? "#ffaaaa" : "#aaffaa";
            if (messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => { msgDiv.innerText = ""; }, 3000);
        }

        // ---------- رویدادها ----------
        document.getElementById("refreshBtn").addEventListener("click", refreshForm);
        document.getElementById("birForm").addEventListener("submit", (e) => { e.preventDefault(); saveRecord(); });
        document.getElementById("exportTodayBtn").addEventListener("click", exportTodayData);
        document.getElementById("clearTodayBtn").addEventListener("click", clearTodayData);

        // ---------- تگل تمام صفحه (مانند F11) ----------
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                // وارد حالت تمام صفحه شو
                document.documentElement.requestFullscreen().catch(err => {
                    showMessage(`خطا در تمام صفحه: ${err.message}`, "error");
                });
                fullscreenBtn.textContent = '✖ خروج';
                fullscreenBtn.style.backgroundColor = '#8b0000';
            } else {
                // خارج شو از تمام صفحه
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ تمام صفحه';
                fullscreenBtn.style.backgroundColor = '#555';
            }
        }

        // رویداد کلیک دکمه
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // اگر کاربر با F11 خودش خارج شد، متن دکمه هم به‌روز شود
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '✖ خروج';
                fullscreenBtn.style.backgroundColor = '#8b0000';
            } else {
                fullscreenBtn.textContent = '⛶ تمام صفحه';
                fullscreenBtn.style.backgroundColor = '#555';
            }
        });
        loadDataFromLocalStorage();
    </script>
</body>
</html>
