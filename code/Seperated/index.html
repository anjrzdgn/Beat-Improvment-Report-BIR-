<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beat Improve Report (BIR)</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>

<div class="app-container">
    <h1 class="app-title">🎯 Beat Improve Report (BIR)</h1>
    <div class="live-clock" id="liveClock">00:00:00 2026-05-10</div>

    <div class="main-layout">
        <form id="birForm" class="bir-form">
            <div class="two-columns">
                <div class="right-col">
                    <div class="field-group">
                        <label>سال تولد</label>
                        <select id="birthYear"></select>
                    </div>
                    <div class="double-field-row">
                        <div class="field-group">
                            <label>ماه تولد</label>
                            <select id="birthMonth">
                                <option value="فروردین">فروردین</option><option value="اردیبهشت">اردیبهشت</option>
                                <option value="خرداد">خرداد</option><option value="تیر">تیر</option>
                                <option value="مرداد">مرداد</option><option value="شهریور">شهریور</option>
                                <option value="مهر">مهر</option><option value="آبان">آبان</option>
                                <option value="آذر">آذر</option><option value="دی">دی</option>
                                <option value="بهمن">بهمن</option><option value="اسفند">اسفند</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>روز تولد</label>
                            <input type="text" id="birthDay" class="numeric-input" placeholder="روز" readonly>
                        </div>
                    </div>
                    <div class="field-group">
                        <label>جنسیت</label>
                        <select id="gender">
                            <option value="F">F (دختر)</option>
                            <option value="M">M (پسر)</option>
                        </select>
                    </div>
                </div>

                <div class="left-col">
                    <div class="field-group">
                        <label>شماره استیشن</label>
                        <select id="station">
                            <option value="1">1</option>
                            <option value="2">2</option>
                        </select>
                    </div>
                    <div class="field-group" id="difficultyGroup">
                        <label>سختی کار</label>
                        <select id="difficulty">
                            <option value="جهت‌دار-آسان">جهت‌دار-آسان</option>
                            <option value="جهت‌دار-متوسط">جهت‌دار-متوسط</option>
                            <option value="جهت‌دار-سخت">جهت‌دار-سخت</option>
                            <option value="نقطه‌ای-آسان">نقطه‌ای-آسان</option>
                            <option value="نقطه‌ای-متوسط">نقطه‌ای-متوسط</option>
                            <option value="نقطه‌ای-سخت">نقطه‌ای-سخت</option>
                        </select>
                    </div>
                    <div class="double-field-row">
                        <div class="field-group">
                            <label>بار چندم</label>
                            <input type="text" id="sessionNumber" class="numeric-input" placeholder="عدد" readonly>
                        </div>
                        <div class="field-group">
                            <label>امتیاز</label>
                            <input type="text" id="score" class="numeric-input" placeholder="عدد" readonly>
                        </div>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button type="button" id="exportTodayBtn" class="btn-main btn-export">📁 خروجی امروز</button>
                <button type="button" id="refreshBtn" class="btn-main btn-refresh">♻️ تازه‌سازی</button>
                <button type="submit" class="btn-main btn-save">💾 ذخیره</button>
            </div>

            <div class="footer-actions">
                <div class="today-counter" id="todayCounter">تعداد امروز: 0</div>
                <button type="button" id="clearTodayBtn" class="btn-footer btn-clear-today">🗑️ حذف داده‌های امروز</button>
                <button type="button" id="fullscreenBtn" class="btn-footer btn-fullscreen">⛶ تمام صفحه</button>
            </div>
        </form>

        <div class="custom-keyboard">
            <div class="keyboard-row">
                <button type="button" class="key-btn" data-value="1">1</button>
                <button type="button" class="key-btn" data-value="2">2</button>
                <button type="button" class="key-btn" data-value="3">3</button>
            </div>
            <div class="keyboard-row">
                <button type="button" class="key-btn" data-value="4">4</button>
                <button type="button" class="key-btn" data-value="5">5</button>
                <button type="button" class="key-btn" data-value="6">6</button>
            </div>
            <div class="keyboard-row">
                <button type="button" class="key-btn" data-value="7">7</button>
                <button type="button" class="key-btn" data-value="8">8</button>
                <button type="button" class="key-btn" data-value="9">9</button>
            </div>
            <div class="keyboard-row">
                <button type="button" id="clearDigitBtn" class="key-btn key-clear">⌫</button>
                <button type="button" class="key-btn" data-value="0">0</button>
            </div>
            
            <div id="statusBox">آماده برای ثبت داده...</div>
            <div class="footer-copyright">A MEDULATOR APP© 2026</div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
