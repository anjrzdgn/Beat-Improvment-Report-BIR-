<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beat Improve Report (BIR)</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: rgba(0, 0, 0, 0.75);
            --accent-green: #4caf50;
            --accent-orange: #ff9800;
            --accent-blue: #2196f3;
            --error-red: #8b0000;
            --text-gold: #ffd966;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }

        .app-container {
            width: 98%;
            max-width: 1300px;
            height: 98vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem; /* فاصله خیلی کم بین تایتل و محتوا */
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .live-clock {
            font-size: 1.1rem;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 0.2rem 1.5rem;
            border-radius: 50px;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            width: 100%;
            height: auto;
            align-items: stretch;
            justify-content: center;
        }

        /* بخش فرم سمت راست */
        .bir-form {
            flex: 2;
            background: var(--panel-bg);
            padding: 1.2rem;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .two-columns {
            display: flex;
            gap: 1rem;
        }

        .right-col, .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            align-items: center; /* تراز کردن محتویات ستون در مرکز */
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            align-items: center;
            width: 100%;
        }

        .field-group label {
            color: white;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .field-group select, .field-group input {
            width: 85%; /* فیلدهای تک‌تایی */
            padding: 0.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 15px;
            border: none;
            text-align: center;
            outline: none;
        }

        /* تراز کردن فیلدهای دوتایی دقیقاً زیر بالایی‌ها */
        .double-field-row {
            display: flex;
            gap: 0.5rem;
            width: 85%; /* دقیقاً هم‌عرض فیلد بالایی */
            justify-content: center;
        }

        .double-field-row .field-group {
            width: 50%;
        }

        .double-field-row input, .double-field-row select {
            width: 100% !important; /* پر کردن نیمی از فضای ردیف */
        }

        /* دکمه‌های اصلی - پوشش کامل عرض فیلدها */
        .button-group {
            display: flex;
            gap: 0.8rem;
            width: 93%; /* تنظیم شده برای پوشش دو ستون فیلدها */
            margin: 0 auto;
        }

        .btn-main {
            flex: 1;
            padding: 0.6rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-save { background: var(--accent-green); }
        .btn-refresh { background: var(--accent-orange); }
        .btn-export { background: var(--accent-blue); }

        .footer-actions {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            align-items: center;
            width: 100%;
        }

        .btn-footer {
            width: 60%;
            padding: 0.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .btn-clear-today { background: #b22222; }
        .btn-fullscreen { background: #555; }

        .today-counter {
            font-size: 0.85rem;
            color: var(--text-gold);
            background: rgba(255,255,255,0.05);
            padding: 0.3rem 1.2rem;
            border-radius: 15px;
        }

        /* بخش کیبورد سمت چپ */
        .custom-keyboard {
            flex: 0.9;
            background: rgba(30, 30, 45, 0.95);
            padding: 1rem;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            justify-content: space-between;
        }

        .keyboard-row {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .key-btn {
            background: #34495e;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            padding: 0.6rem 0;
            flex: 1;
            cursor: pointer;
        }

        .key-btn:active { background: #2c3e50; transform: scale(0.95); }
        .key-clear { background: var(--error-red); flex: 2.1; }

        /* باکس گزارشات (جایگزین پاپ‌آپ) */
        #statusBox {
            width: 100%;
            min-height: 50px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .status-error { color: #ff6b6b; border-color: #ff6b6b !important; }
        .status-success { color: #51cf66; border-color: #51cf66 !important; }

        .footer-copyright {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1 class="app-title">🎯 Beat Improve Report (BIR)</h1>
        <div class="live-clock" id="liveClock">00:00:00 2026-05-10</div>

        <div class="main-layout">
            <form id="birForm" class="bir-form">
                <div class="two-columns">
                    <div class="right-col">
                        <div class="field-group">
                            <label>سال تولد</label>
                            <select id="birthYear"></select>
                        </div>
                        <div class="double-field-row">
                            <div class="field-group">
                                <label>ماه تولد</label>
                                <select id="birthMonth">
                                    <option value="فروردین">فروردین</option><option value="اردیبهشت">اردیبهشت</option>
                                    <option value="خرداد">خرداد</option><option value="تیر">تیر</option>
                                    <option value="مرداد">مرداد</option><option value="شهریور">شهریور</option>
                                    <option value="مهر">مهر</option><option value="آبان">آبان</option>
                                    <option value="آذر">آذر</option><option value="دی">دی</option>
                                    <option value="بهمن">بهمن</option><option value="اسفند">اسفند</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label>روز تولد</label>
                                <input type="text" id="birthDay" class="numeric-input" placeholder="روز" readonly>
                            </div>
                        </div>
                        <div class="field-group">
                            <label>جنسیت</label>
                            <select id="gender">
                                <option value="F">F (دختر)</option>
                                <option value="M">M (پسر)</option>
                            </select>
                        </div>
                    </div>

                    <div class="left-col">
                        <div class="field-group">
                            <label>شماره استیشن</label>
                            <select id="station">
                                <option value="1">1</option>
                                <option value="2">2</option>
                            </select>
                        </div>
                        <div class="field-group" id="difficultyGroup">
                            <label>سختی کار</label>
                            <select id="difficulty">
                                <option value="جهت‌دار-آسان">جهت‌دار-آسان</option>
                                <option value="جهت‌دار-متوسط">جهت‌دار-متوسط</option>
                                <option value="جهت‌دار-سخت">جهت‌دار-سخت</option>
                                <option value="نقطه‌ای-آسان">نقطه‌ای-آسان</option>
                                <option value="نقطه‌ای-متوسط">نقطه‌ای-متوسط</option>
                                <option value="نقطه‌ای-سخت">نقطه‌ای-سخت</option>
                            </select>
                        </div>
                        <div class="double-field-row">
                            <div class="field-group">
                                <label>بار چندم</label>
                                <input type="text" id="sessionNumber" class="numeric-input" placeholder="عدد" readonly>
                            </div>
                            <div class="field-group">
                                <label>امتیاز</label>
                                <input type="text" id="score" class="numeric-input" placeholder="عدد" readonly>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" id="exportTodayBtn" class="btn-main btn-export">📁 خروجی امروز</button>
                    <button type="button" id="refreshBtn" class="btn-main btn-refresh">♻️ تازه‌سازی</button>
                    <button type="submit" class="btn-main btn-save">💾 ذخیره</button>
                </div>

                <div class="footer-actions">
                    <div class="today-counter" id="todayCounter">تعداد امروز: 0</div>
                    <button type="button" id="clearTodayBtn" class="btn-footer btn-clear-today">🗑️ حذف داده‌های امروز</button>
                    <button type="button" id="fullscreenBtn" class="btn-footer btn-fullscreen">⛶ تمام صفحه</button>
                </div>
            </form>

            <div class="custom-keyboard">
                <div class="keyboard-row">
                    <button type="button" class="key-btn" data-value="1">1</button>
                    <button type="button" class="key-btn" data-value="2">2</button>
                    <button type="button" class="key-btn" data-value="3">3</button>
                </div>
                <div class="keyboard-row">
                    <button type="button" class="key-btn" data-value="4">4</button>
                    <button type="button" class="key-btn" data-value="5">5</button>
                    <button type="button" class="key-btn" data-value="6">6</button>
                </div>
                <div class="keyboard-row">
                    <button type="button" class="key-btn" data-value="7">7</button>
                    <button type="button" class="key-btn" data-value="8">8</button>
                    <button type="button" class="key-btn" data-value="9">9</button>
                </div>
                <div class="keyboard-row">
                    <button type="button" id="clearDigitBtn" class="key-btn key-clear">⌫</button>
                    <button type="button" class="key-btn" data-value="0">0</button>
                </div>
                
                <div id="statusBox">آماده برای ثبت داده...</div>
                
                <div class="footer-copyright">A MEDULATOR APP© 2026</div>
            </div>
        </div>
    </div>

    <script>
        let birData = JSON.parse(localStorage.getItem("bir_records") || "[]");
        let activeField = null;

        // --- پخش صدا ---
        function playBeep(freq, duration) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain);
            gain.connect(context.destination);
            osc.frequency.value = freq;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + duration);
            osc.stop(context.currentTime + duration);
        }

        // --- نمایش گزارش در باکس وضعیت ---
        function reportStatus(text, type) {
            const box = document.getElementById("statusBox");
            box.innerText = text;
            box.className = type === "error" ? "status-error" : "status-success";
            
            if(type === "error") playBeep(440, 0.4);
            else playBeep(880, 0.2);

            setTimeout(() => {
                box.className = "";
                if(box.innerText === text) box.innerText = "آماده برای ثبت داده...";
            }, 4000);
        }

        const yearSelect = document.getElementById("birthYear");
        for (let y = 83; y <= 98; y++) {
            let opt = document.createElement("option");
            opt.value = y; opt.textContent = y;
            yearSelect.appendChild(opt);
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('fa-IR', { hour12: false });
            const dateStr = now.toISOString().slice(0, 10);
            document.getElementById("liveClock").innerText = `${timeStr} ${dateStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const numericInputs = document.querySelectorAll(".numeric-input");
        numericInputs.forEach(input => {
            input.addEventListener("click", function() {
                numericInputs.forEach(i => i.style.background = "white");
                this.style.background = "#e3f2fd";
                activeField = this;
                if (!this._rawValue) this._rawValue = "";
            });
        });

        document.querySelectorAll(".key-btn[data-value]").forEach(btn => {
            btn.addEventListener("click", () => {
                if (activeField) {
                    activeField._rawValue += btn.getAttribute("data-value");
                    activeField.value = activeField._rawValue;
                } else {
                    reportStatus("⚠️ ابتدا یک فیلد را انتخاب کنید", "error");
                }
            });
        });

        document.getElementById("clearDigitBtn").addEventListener("click", () => {
            if (activeField) {
                activeField._rawValue = activeField._rawValue.slice(0, -1);
                activeField.value = activeField._rawValue;
            }
        });

        const stationSelect = document.getElementById("station");
        const diffGroup = document.getElementById("difficultyGroup");
        stationSelect.addEventListener("change", () => {
            if (stationSelect.value === "2") {
                diffGroup.style.opacity = "0.2";
                diffGroup.style.pointerEvents = "none";
            } else {
                diffGroup.style.opacity = "1";
                diffGroup.style.pointerEvents = "all";
            }
        });

        document.getElementById("birForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const score = document.getElementById("score").value;
            const session = document.getElementById("sessionNumber").value;
            const day = document.getElementById("birthDay").value;

            if (!score || !session || !day) {
                reportStatus("❌ خطا: فیلدهای عددی خالی هستند!", "error");
                return;
            }

            const dayNum = parseInt(day);
            if (isNaN(dayNum) || dayNum < 1 || dayNum > 31) {
                reportStatus("❌ خطا: روز تولد باید بین 1 تا 31 باشد!", "error");
                // فوکوس روی فیلد روز برای اصلاح سریع
                document.getElementById("birthDay").style.background = "#ffcccc";
                return;
            }

            const record = {
                date_iso: new Date().toISOString().slice(0,10),
                birth_year: document.getElementById("birthYear").value,
                birth_month: document.getElementById("birthMonth").value,
                birth_day: day,
                gender: document.getElementById("gender").value,
                station: stationSelect.value,
                difficulty: stationSelect.value === "1" ? document.getElementById("difficulty").value : "N/A",
                session_number: session,
                score: score
            };

            const isDup = birData.some(r => 
                r.birth_year === record.birth_year && r.birth_day === record.birth_day &&
                r.session_number === record.session_number && r.score === record.score
            );

            if (isDup) {
                reportStatus("❌ تکراری: این داده قبلاً ثبت شده!", "error");
                return;
            }

            birData.push(record);
            localStorage.setItem("bir_records", JSON.stringify(birData));
            updateTodayCounter();
            numericInputs.forEach(i => { i.value = ""; i._rawValue = ""; i.style.background = "white"; });
            activeField = null;
            reportStatus("✅ موفقیت: داده با موفقیت ذخیره شد", "success");
        });

        function updateTodayCounter() {
            const today = new Date().toISOString().slice(0,10);
            const count = birData.filter(r => r.date_iso === today).length;
            document.getElementById("todayCounter").innerText = `تعداد امروز: ${count}`;
        }

        document.getElementById("exportTodayBtn").addEventListener("click", () => {
            const today = new Date().toISOString().slice(0,10);
            const todayData = birData.filter(r => r.date_iso === today);
            if (todayData.length === 0) { reportStatus("⚠️ داده‌ای برای امروز یافت نشد", "error"); return; }
            const blob = new Blob([JSON.stringify(todayData, null, 2)], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `BIR_${today}.json`;
            a.click();
            reportStatus("📁 فایل خروجی آماده دانلود شد", "success");
        });

        document.getElementById("clearTodayBtn").addEventListener("click", () => {
            if (confirm("تمامی داده‌های امروز حذف شوند؟")) {
                const today = new Date().toISOString().slice(0,10);
                birData = birData.filter(r => r.date_iso !== today);
                localStorage.setItem("bir_records", JSON.stringify(birData));
                updateTodayCounter();
                reportStatus("🗑️ داده‌های امروز پاکسازی شدند", "success");
            }
        });

        document.getElementById("refreshBtn").addEventListener("click", () => location.reload());
        document.getElementById("fullscreenBtn").addEventListener("click", () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        updateTodayCounter();
    </script>
</body>
</html>
